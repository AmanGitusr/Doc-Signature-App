spring.application.name=document-signature-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

server.port=${SERVER_PORT:8090}

app.base-url=${APP_BASE_URL:http://localhost:8090}
app.storage-dir=${UPLOAD_DIR:./storage/uploads}
app.cors-allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.jwt.secret=${JWT_SECRET:please-change-this-secret-to-a-long-random-value}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:240}

logging.level.root=INFO
logging.level.com.docsignature=INFO
logging.level.org.hibernate.SQL=WARN
